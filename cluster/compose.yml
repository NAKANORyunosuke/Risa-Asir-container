services:
  # master は待受と Asir 実行だけを担当する。
  master:
    build:
      context: ..
      dockerfile: ../dockerfile
    image: ${RISA_ASIR_IMAGE:-risa-asir:latest}
    hostname: asir-master
    working_dir: /workspace
    command: ["sleep", "infinity"]
    stdin_open: true
    tty: true
    volumes:
      - ..:/workspace
